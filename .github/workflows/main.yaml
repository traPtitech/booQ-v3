name: CI

on:
  push:
    branches:
      - "main"
  pull_request:

jobs:
  build:
    name: Server build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod
      - name: mod
        run: go mod download
      - name: build
        run: go build
      - uses: actions/upload-artifact@v4
        with:
          name: booQ
          path: booQ
  lint:
    name: Server lint
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod
      - name: Install reviewdog
        run: curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
      - name: Install golangci-lint
        run: curl -sfL https://install.goreleaser.com/github.com/golangci/golangci-lint.sh | sh -s --  -b $(go env GOPATH)/bin
      - name: golangci-lint
        run: golangci-lint run --out-format=line-number | reviewdog -f=golangci-lint -name=golangci-lint -reporter=github-check
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  test:
    name: Server test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod
      - name: Generate Mocks
        run: go generate ./...
      - name: Run Test
        run: go test -v ./usecase ./repository ./handler
  spectral:
    name: OpenApi Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Spectral checks
        uses: stoplightio/spectral-action@v0.8.11
        with:
          file_glob: docs/openapi.yml
          repo_token: ${{ secrets.GITHUB_TOKEN }}

